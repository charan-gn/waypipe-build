name: build waypipe

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu
      - run: sudo apt-get update && sudo apt-get install -y libvulkan-dev libgbm-dev liblz4-dev libzstd-dev
      - run: cargo install bindgen-cli --locked
      - run: cargo build --release --no-default-features --features lz4,zstd,gbmfallback
      - uses: actions/upload-artifact@v4
        with:
          name: waypipe-x86_64
          path: target/release/waypipe

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup arm64 cross toolchain
        run: |
          # Ubuntu 24.04 uses deb822 format in ubuntu.sources
          # Security repos don't serve arm64, so constrain them to amd64
          sudo python3 -c "
import re, pathlib
p = pathlib.Path('/etc/apt/sources.list.d/ubuntu.sources')
content = p.read_text()
# Split into stanzas (separated by blank lines), add 'Architectures: amd64' to security stanza
stanzas = re.split(r'\n\n+', content)
new_stanzas = []
for s in stanzas:
    if 'security.ubuntu.com' in s and 'Architectures:' not in s:
        s = s.rstrip() + '\nArchitectures: amd64'
    new_stanzas.append(s)
p.write_text('\n\n'.join(new_stanzas))
"
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev:arm64 \
            libgbm-dev:arm64 \
            liblz4-dev:arm64 \
            libzstd-dev:arm64 \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config-aarch64-linux-gnu

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-unknown-linux-gnu

      - run: cargo install bindgen-cli --locked

      - name: Build aarch64
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
          cargo build --release \
            --target aarch64-unknown-linux-gnu \
            --no-default-features \
            --features lz4,zstd,gbmfallback

      - uses: actions/upload-artifact@v4
        with:
          name: waypipe-aarch64
          path: target/aarch64-unknown-linux-gnu/release/waypipe
