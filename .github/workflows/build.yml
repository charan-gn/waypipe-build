name: build waypipe

on: [push, workflow_dispatch]

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-gnu
      - run: sudo apt-get update && sudo apt-get install -y libvulkan-dev libgbm-dev liblz4-dev libzstd-dev
      - run: cargo install bindgen-cli --locked
      - run: cargo build --release --no-default-features --features lz4,zstd,gbmfallback
      - uses: actions/upload-artifact@v4
        with:
          name: waypipe-x86_64
          path: target/release/waypipe

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup arm64 cross toolchain
        run: |
          # Overwrite apt sources: archive for amd64, ports for arm64, no security
          sudo tee /etc/apt/sources.list.d/ubuntu.sources << 'EOF'
          Types: deb
          URIs: http://archive.ubuntu.com/ubuntu
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe restricted multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe restricted multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev:arm64 \
            libgbm-dev:arm64 \
            liblz4-dev:arm64 \
            libzstd-dev:arm64 \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            pkg-config
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-unknown-linux-gnu
      - run: cargo install bindgen-cli --locked
      - name: Build aarch64
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
          cargo build --release \
            --target aarch64-unknown-linux-gnu \
            --no-default-features \
            --features lz4,zstd,gbmfallback
      - uses: actions/upload-artifact@v4
        with:
          name: waypipe-aarch64
          path: target/aarch64-unknown-linux-gnu/release/waypipe
